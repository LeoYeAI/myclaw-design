<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>MyClaw.ai — Your AI, Your Server</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 510px; overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #F7F5F0;
    color: #2C2C2C;
    position: relative;
  }
  .canvas {
    width: 1200px; height: 510px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #F7F5F0 0%, #F0EDE6 40%, #E8E2D8 100%);
  }
  /* Organic background shapes */
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.12;
  }
  .bg-circle.c1 {
    width: 420px; height: 420px;
    background: radial-gradient(circle, #7B9E87 0%, transparent 70%);
    top: -120px; right: -60px;
  }
  .bg-circle.c2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #B8C5B0 0%, transparent 70%);
    bottom: -80px; left: 60px;
  }
  .bg-circle.c3 {
    width: 180px; height: 180px;
    background: radial-gradient(circle, #D4C5B0 0%, transparent 70%);
    top: 60px; left: 380px;
  }
  /* Curved line decoration */
  .curve-line {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  /* Content */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    height: 100%;
    padding: 0 80px;
  }
  .left {
    flex: 1;
  }
  .brand {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #7B9E87;
    margin-bottom: 20px;
  }
  .brand-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: #7B9E87;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }
  h1 {
    font-size: 56px;
    font-weight: 300;
    line-height: 1.15;
    letter-spacing: -1px;
    color: #2C2C2C;
    margin-bottom: 24px;
  }
  h1 span {
    font-weight: 500;
    color: #7B9E87;
  }
  .subtitle {
    font-size: 18px;
    font-weight: 300;
    line-height: 1.7;
    color: #6B6B6B;
    max-width: 420px;
  }
  .tag-row {
    display: flex;
    gap: 10px;
    margin-top: 28px;
  }
  .tag {
    padding: 8px 18px;
    background: rgba(123, 158, 135, 0.1);
    border: 1px solid rgba(123, 158, 135, 0.2);
    border-radius: 20px;
    font-size: 13px;
    font-weight: 400;
    color: #7B9E87;
  }
  /* Right illustration */
  .right {
    width: 400px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  .server-icon {
    width: 200px; height: 200px;
    position: relative;
  }
  .server-ring {
    position: absolute;
    border: 2px solid rgba(123, 158, 135, 0.2);
    border-radius: 50%;
  }
  .server-ring.r1 {
    width: 200px; height: 200px; top: 0; left: 0;
  }
  .server-ring.r2 {
    width: 160px; height: 160px; top: 20px; left: 20px;
    border-color: rgba(123, 158, 135, 0.3);
  }
  .server-ring.r3 {
    width: 120px; height: 120px; top: 40px; left: 40px;
    border-color: rgba(123, 158, 135, 0.4);
  }
  .server-core {
    position: absolute;
    width: 60px; height: 60px;
    top: 70px; left: 70px;
    background: linear-gradient(135deg, #7B9E87, #B8C5B0);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .server-core::after {
    content: '⟐';
    font-size: 24px;
    color: white;
  }
  /* Floating nodes */
  .node {
    position: absolute;
    width: 36px; height: 36px;
    background: #F7F5F0;
    border: 2px solid #E8E2D8;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .node.n1 { top: -10px; right: 40px; }
  .node.n2 { bottom: 10px; right: 20px; }
  .node.n3 { top: 50px; left: -30px; }
  .node.n4 { bottom: -10px; left: 40px; }
  /* URL bar */
  .url-bar {
    position: absolute;
    bottom: 30px;
    right: 80px;
    font-size: 13px;
    font-weight: 400;
    color: #B0A89E;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
  <div class="bg-circle c3"></div>

  <svg class="curve-line" viewBox="0 0 1200 510" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 400 Q300 350 600 380 T1200 300" stroke="#E8E2D8" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M0 450 Q400 380 800 420 T1200 360" stroke="#D4C5B0" stroke-width="1" fill="none" opacity="0.3"/>
  </svg>

  <div class="content">
    <div class="left">
      <div class="brand"><span class="brand-dot"></span>MyClaw.ai</div>
      <h1>Your AI,<br>Your <span>Server</span></h1>
      <p class="subtitle">A full personal server with complete code control. Your AI assistant, running on your terms.</p>
      <div class="tag-row">
        <span class="tag">Open Source</span>
        <span class="tag">Self-Hosted</span>
        <span class="tag">Full Control</span>
      </div>
    </div>
    <div class="right">
      <div class="server-icon">
        <div class="server-ring r1"></div>
        <div class="server-ring r2"></div>
        <div class="server-ring r3"></div>
        <div class="server-core"></div>
        <div class="node n1">🤖</div>
        <div class="node n2">🔒</div>
        <div class="node n3">⚡</div>
        <div class="node n4">🌿</div>
      </div>
    </div>
  </div>

  <div class="url-bar">myclaw.ai</div>
</div>
</body>
</html>
