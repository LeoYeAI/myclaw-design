<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyClaw.ai — Your AI, Your Server</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #FAFAF8;
    color: #1A1A1A;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .cover {
    width: 1200px;
    height: 510px;
    background: #FAFAF8;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #E8E0D8;
  }
  .cover-inner {
    text-align: center;
    padding: 0 120px;
  }
  .brand {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #D4A574;
    margin-bottom: 48px;
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 400;
    line-height: 1.2;
    letter-spacing: -0.5px;
    color: #1A1A1A;
    margin-bottom: 28px;
  }
  .divider {
    width: 48px;
    height: 1px;
    background: #D4A574;
    margin: 0 auto 28px;
  }
  .subtitle {
    font-size: 15px;
    font-weight: 300;
    line-height: 1.7;
    color: #8A8078;
    max-width: 420px;
    margin: 0 auto;
  }
  .corner-mark {
    position: absolute;
    width: 24px;
    height: 24px;
  }
  .corner-mark::before,
  .corner-mark::after {
    content: '';
    position: absolute;
    background: #E8E0D8;
  }
  .corner-mark.tl { top: 32px; left: 32px; }
  .corner-mark.tl::before { width: 24px; height: 1px; top: 0; left: 0; }
  .corner-mark.tl::after { width: 1px; height: 24px; top: 0; left: 0; }
  .corner-mark.tr { top: 32px; right: 32px; }
  .corner-mark.tr::before { width: 24px; height: 1px; top: 0; right: 0; }
  .corner-mark.tr::after { width: 1px; height: 24px; top: 0; right: 0; }
  .corner-mark.bl { bottom: 32px; left: 32px; }
  .corner-mark.bl::before { width: 24px; height: 1px; bottom: 0; left: 0; }
  .corner-mark.bl::after { width: 1px; height: 24px; bottom: 0; left: 0; }
  .corner-mark.br { bottom: 32px; right: 32px; }
  .corner-mark.br::before { width: 24px; height: 1px; bottom: 0; right: 0; }
  .corner-mark.br::after { width: 1px; height: 24px; bottom: 0; right: 0; }
  .dot {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #D4A574;
    opacity: 0.5;
  }
  .dot-1 { top: 80px; right: 160px; }
  .dot-2 { bottom: 100px; left: 180px; }
  .url {
    position: absolute;
    bottom: 32px;
    right: 64px;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 2px;
    color: #C0B8AE;
    text-transform: lowercase;
  }
</style>
</head>
<body>
  <div class="cover">
    <div class="corner-mark tl"></div>
    <div class="corner-mark tr"></div>
    <div class="corner-mark bl"></div>
    <div class="corner-mark br"></div>
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="cover-inner">
      <div class="brand">MyClaw.ai</div>
      <h1 class="title">Your AI, Your Server</h1>
      <div class="divider"></div>
      <p class="subtitle">A personal AI platform that gives every user a full server with complete code control.</p>
    </div>
    <span class="url">myclaw.ai</span>
  </div>
</body>
</html>
