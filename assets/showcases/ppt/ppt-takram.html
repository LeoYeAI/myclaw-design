<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>MyClaw Growth — Data Slide</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #F7F5F0;
    color: #2C2C2C;
  }
  .slide {
    width: 1920px; height: 1080px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, #F7F5F0 0%, #F0EDE6 50%, #E8E2D8 100%);
    padding: 70px 90px;
    display: flex;
    flex-direction: column;
  }
  /* Background art */
  .bg-blob {
    position: absolute;
    border-radius: 50%;
    opacity: 0.08;
  }
  .bg-blob.b1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #7B9E87, transparent 70%);
    top: -200px; right: 100px;
  }
  .bg-blob.b2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #D4C5B0, transparent 70%);
    bottom: -100px; left: -50px;
  }
  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 50px;
    position: relative;
    z-index: 2;
  }
  .header-left h1 {
    font-size: 48px;
    font-weight: 300;
    letter-spacing: -1px;
    line-height: 1.2;
  }
  .header-left h1 span { color: #7B9E87; font-weight: 500; }
  .header-left .sub {
    font-size: 16px;
    font-weight: 300;
    color: #8A8A8A;
    margin-top: 8px;
    line-height: 1.7;
  }
  .header-right {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .period-pill {
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 400;
    border: 1px solid #E8E2D8;
    color: #8A8A8A;
    background: transparent;
  }
  .period-pill.active {
    background: #7B9E87;
    color: white;
    border-color: #7B9E87;
  }
  /* Metrics row */
  .metrics {
    display: flex;
    gap: 30px;
    margin-bottom: 50px;
    position: relative;
    z-index: 2;
  }
  .metric-card {
    flex: 1;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border: 1px solid #E8E2D8;
    border-radius: 20px;
    padding: 30px 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .metric-label {
    font-size: 13px;
    font-weight: 400;
    color: #8A8A8A;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .metric-value {
    font-size: 42px;
    font-weight: 300;
    letter-spacing: -1px;
    line-height: 1;
  }
  .metric-value span {
    font-size: 16px;
    font-weight: 400;
    color: #7B9E87;
    margin-left: 8px;
  }
  .metric-bar {
    margin-top: 16px;
    height: 6px;
    background: #F0EDE6;
    border-radius: 3px;
    overflow: hidden;
  }
  .metric-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #7B9E87, #B8C5B0);
  }
  /* Chart area */
  .chart-area {
    flex: 1;
    display: flex;
    gap: 30px;
    position: relative;
    z-index: 2;
  }
  .chart-main {
    flex: 2;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border: 1px solid #E8E2D8;
    border-radius: 24px;
    padding: 36px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    position: relative;
    overflow: hidden;
  }
  .chart-title {
    font-size: 15px;
    font-weight: 500;
    color: #2C2C2C;
    margin-bottom: 24px;
  }
  .chart-svg {
    width: 100%;
    height: calc(100% - 50px);
  }
  .chart-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .chart-small {
    flex: 1;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border: 1px solid #E8E2D8;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    display: flex;
    flex-direction: column;
  }
  .chart-small .chart-title { margin-bottom: 16px; }
  /* Donut chart */
  .donut-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Bar chart mini */
  .bars {
    flex: 1;
    display: flex;
    align-items: flex-end;
    gap: 12px;
    padding-top: 10px;
  }
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .bar-stick {
    width: 100%;
    border-radius: 8px 8px 4px 4px;
    background: linear-gradient(180deg, #7B9E87, #B8C5B0);
  }
  .bar-label {
    font-size: 11px;
    color: #8A8A8A;
    font-weight: 400;
  }
  /* Footer */
  .slide-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    position: relative;
    z-index: 2;
  }
  .slide-footer .brand {
    font-size: 13px;
    font-weight: 500;
    color: #B0A89E;
    letter-spacing: 1px;
  }
  .slide-footer .page {
    font-size: 13px;
    color: #B0A89E;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>

  <div class="header">
    <div class="header-left">
      <h1>MyClaw <span>Growth</span></h1>
      <p class="sub">Platform metrics & user adoption — Q1 2026</p>
    </div>
    <div class="header-right">
      <div class="period-pill">Monthly</div>
      <div class="period-pill active">Quarterly</div>
      <div class="period-pill">Yearly</div>
    </div>
  </div>

  <div class="metrics">
    <div class="metric-card">
      <div class="metric-label">Active Users</div>
      <div class="metric-value">12.4K<span>+34%</span></div>
      <div class="metric-bar"><div class="metric-bar-fill" style="width:78%"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Deployments</div>
      <div class="metric-value">8.7K<span>+52%</span></div>
      <div class="metric-bar"><div class="metric-bar-fill" style="width:65%"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Skills Installed</div>
      <div class="metric-value">47.2K<span>+89%</span></div>
      <div class="metric-bar"><div class="metric-bar-fill" style="width:92%"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Uptime</div>
      <div class="metric-value">99.9%<span>stable</span></div>
      <div class="metric-bar"><div class="metric-bar-fill" style="width:99%"></div></div>
    </div>
  </div>

  <div class="chart-area">
    <div class="chart-main">
      <div class="chart-title">User Growth Trajectory</div>
      <svg class="chart-svg" viewBox="0 0 900 320" preserveAspectRatio="none">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#7B9E87" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#7B9E87" stop-opacity="0.02"/>
          </linearGradient>
        </defs>
        <!-- Grid lines -->
        <line x1="0" y1="80" x2="900" y2="80" stroke="#E8E2D8" stroke-width="1" opacity="0.5"/>
        <line x1="0" y1="160" x2="900" y2="160" stroke="#E8E2D8" stroke-width="1" opacity="0.5"/>
        <line x1="0" y1="240" x2="900" y2="240" stroke="#E8E2D8" stroke-width="1" opacity="0.5"/>
        <!-- Area fill -->
        <path d="M0 280 Q75 270 150 260 T300 220 T450 170 T600 110 T750 60 T900 20 L900 320 L0 320 Z" fill="url(#areaGrad)"/>
        <!-- Main curve -->
        <path d="M0 280 Q75 270 150 260 T300 220 T450 170 T600 110 T750 60 T900 20" fill="none" stroke="#7B9E87" stroke-width="3" stroke-linecap="round"/>
        <!-- Secondary curve -->
        <path d="M0 290 Q75 285 150 278 T300 260 T450 235 T600 200 T750 170 T900 140" fill="none" stroke="#D4C5B0" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4"/>
        <!-- Data points -->
        <circle cx="150" cy="260" r="5" fill="#7B9E87"/>
        <circle cx="300" cy="220" r="5" fill="#7B9E87"/>
        <circle cx="450" cy="170" r="5" fill="#7B9E87"/>
        <circle cx="600" cy="110" r="5" fill="#7B9E87"/>
        <circle cx="750" cy="60" r="5" fill="#7B9E87"/>
        <circle cx="900" cy="20" r="6" fill="#7B9E87" stroke="white" stroke-width="2"/>
        <!-- Labels -->
        <text x="150" y="310" fill="#8A8A8A" font-size="12" text-anchor="middle" font-family="Inter">Oct</text>
        <text x="300" y="310" fill="#8A8A8A" font-size="12" text-anchor="middle" font-family="Inter">Nov</text>
        <text x="450" y="310" fill="#8A8A8A" font-size="12" text-anchor="middle" font-family="Inter">Dec</text>
        <text x="600" y="310" fill="#8A8A8A" font-size="12" text-anchor="middle" font-family="Inter">Jan</text>
        <text x="750" y="310" fill="#8A8A8A" font-size="12" text-anchor="middle" font-family="Inter">Feb</text>
        <text x="900" y="310" fill="#8A8A8A" font-size="12" text-anchor="middle" font-family="Inter">Mar</text>
      </svg>
    </div>
    <div class="chart-side">
      <div class="chart-small">
        <div class="chart-title">Platform Mix</div>
        <div class="donut-wrap">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="54" fill="none" stroke="#F0EDE6" stroke-width="16"/>
            <circle cx="70" cy="70" r="54" fill="none" stroke="#7B9E87" stroke-width="16"
              stroke-dasharray="152 188" stroke-dashoffset="0" transform="rotate(-90 70 70)" stroke-linecap="round"/>
            <circle cx="70" cy="70" r="54" fill="none" stroke="#B8C5B0" stroke-width="16"
              stroke-dasharray="75 265" stroke-dashoffset="-152" transform="rotate(-90 70 70)" stroke-linecap="round"/>
            <circle cx="70" cy="70" r="54" fill="none" stroke="#D4C5B0" stroke-width="16"
              stroke-dasharray="45 295" stroke-dashoffset="-227" transform="rotate(-90 70 70)" stroke-linecap="round"/>
            <text x="70" y="66" text-anchor="middle" font-family="Inter" font-size="22" font-weight="300" fill="#2C2C2C">45%</text>
            <text x="70" y="82" text-anchor="middle" font-family="Inter" font-size="11" fill="#8A8A8A">Linux</text>
          </svg>
        </div>
      </div>
      <div class="chart-small">
        <div class="chart-title">Weekly Active</div>
        <div class="bars">
          <div class="bar-col"><div class="bar-stick" style="height:50px"></div><div class="bar-label">Mon</div></div>
          <div class="bar-col"><div class="bar-stick" style="height:70px"></div><div class="bar-label">Tue</div></div>
          <div class="bar-col"><div class="bar-stick" style="height:85px"></div><div class="bar-label">Wed</div></div>
          <div class="bar-col"><div class="bar-stick" style="height:65px"></div><div class="bar-label">Thu</div></div>
          <div class="bar-col"><div class="bar-stick" style="height:90px"></div><div class="bar-label">Fri</div></div>
          <div class="bar-col"><div class="bar-stick" style="height:40px"></div><div class="bar-label">Sat</div></div>
          <div class="bar-col"><div class="bar-stick" style="height:35px"></div><div class="bar-label">Sun</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="slide-footer">
    <div class="brand">MYCLAW.AI</div>
    <div class="page">03 / 12</div>
  </div>
</div>
</body>
</html>
