<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyClaw Growth — Data Slide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #1A1A1A;
    color: #FAFAF8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .slide {
    width: 1920px;
    height: 1080px;
    background: #1A1A1A;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 200px;
  }
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, #D4A574 50%, transparent 100%);
    opacity: 0.3;
  }
  .header {
    margin-bottom: 100px;
  }
  .label {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #D4A574;
    margin-bottom: 20px;
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    font-weight: 400;
    color: #FAFAF8;
    letter-spacing: -0.5px;
  }
  .metrics {
    display: flex;
    gap: 120px;
  }
  .metric {
    flex: 1;
    max-width: 320px;
  }
  .metric-line {
    width: 100%;
    height: 1px;
    background: #333;
    margin-bottom: 40px;
    position: relative;
  }
  .metric-line::after {
    content: '';
    position: absolute;
    left: 0;
    top: -2px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #D4A574;
  }
  .metric-value {
    font-size: 64px;
    font-weight: 200;
    line-height: 1;
    color: #FAFAF8;
    margin-bottom: 16px;
    letter-spacing: -2px;
  }
  .metric-unit {
    font-size: 24px;
    font-weight: 200;
    color: #D4A574;
    vertical-align: super;
    letter-spacing: 0;
  }
  .metric-label {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #666;
  }
  .metric-change {
    font-size: 12px;
    font-weight: 400;
    color: #D4A574;
    margin-top: 8px;
    opacity: 0.7;
  }
  .footer {
    position: absolute;
    bottom: 60px;
    left: 200px;
    right: 200px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-brand {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #444;
  }
  .footer-date {
    font-size: 11px;
    font-weight: 300;
    color: #444;
  }
  .bg-circle {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    border: 1px solid #222;
    top: -200px;
    right: -100px;
  }
  .bg-circle-2 {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 1px solid #222;
    bottom: -80px;
    left: 100px;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="top-bar"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle-2"></div>
    <div class="header">
      <div class="label">Q1 2026 Performance</div>
      <h1 class="title">MyClaw Growth</h1>
    </div>
    <div class="metrics">
      <div class="metric">
        <div class="metric-line"></div>
        <div class="metric-value">12,847</div>
        <div class="metric-label">Active Instances</div>
        <div class="metric-change">↑ 34% QoQ</div>
      </div>
      <div class="metric">
        <div class="metric-line"></div>
        <div class="metric-value"><span class="metric-unit">$</span>2.4<span class="metric-unit">M</span></div>
        <div class="metric-label">Annual Revenue</div>
        <div class="metric-change">↑ 128% YoY</div>
      </div>
      <div class="metric">
        <div class="metric-line"></div>
        <div class="metric-value">340</div>
        <div class="metric-label">Published Skills</div>
        <div class="metric-change">↑ 67 this quarter</div>
      </div>
    </div>
    <div class="footer">
      <span class="footer-brand">MyClaw.ai</span>
      <span class="footer-date">April 2026</span>
    </div>
  </div>
</body>
</html>
